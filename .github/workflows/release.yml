name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.2.1)'
        required: true

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "v${{ steps.resolve.outputs.version }}"
          git push origin "v${{ steps.resolve.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: rk-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: rk-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: rk-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: rk-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: rk-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compiler
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            sed -i '' "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
            sed -i '' "/^rk-shared/s/version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          else
            sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
            sed -i "/^rk-shared/s/version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          fi

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --package rustkanban
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Generate man page
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: ./target/${{ matrix.target }}/release/rk manpage > rk.1

      - name: Rename binary (unix)
        if: matrix.os != 'windows-latest'
        run: mv target/${{ matrix.target }}/release/rk ${{ matrix.name }}

      - name: Rename binary (windows)
        if: matrix.os == 'windows-latest'
        run: mv target/${{ matrix.target }}/release/rk.exe ${{ matrix.name }}

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

      - name: Upload man page
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: rk.1
          path: rk.1

  publish:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update versions
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          sed -i "/^rk-shared/s/version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Publish rustkanban-shared
        run: cargo publish --allow-dirty --no-verify --package rustkanban-shared
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish rustkanban
        run: cargo publish --allow-dirty --no-verify --package rustkanban
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.sha256
          cat checksums.sha256

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: artifacts/*
          generate_release_notes: true
