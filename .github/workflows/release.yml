name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and create tag
        id: bump
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true

  build:
    needs: version
    if: needs.version.outputs.skipped != 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: rk-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: rk-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: rk-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: rk-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: rk-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compiler
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Rename binary (unix)
        if: matrix.os != 'windows-latest'
        run: mv target/${{ matrix.target }}/release/rk ${{ matrix.name }}

      - name: Rename binary (windows)
        if: matrix.os == 'windows-latest'
        run: mv target/${{ matrix.target }}/release/rk.exe ${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  manpage:
    needs: version
    if: needs.version.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate man page
        run: cargo run -- manpage > rk.1

      - name: Upload man page
        uses: actions/upload-artifact@v4
        with:
          name: rk.1
          path: rk.1

  publish:
    needs: version
    if: needs.version.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Update Cargo.toml version
        run: |
          VERSION="${{ needs.version.outputs.tag }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    needs: [version, build, manpage]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.sha256
          cat checksums.sha256

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          files: artifacts/*
          generate_release_notes: true
