{% extends "base.html" %}

{% block title %}Login Token — RustKanban{% endblock %}

{% block content %}
<div class="centered-card">
    <div class="card" style="text-align: left;">
        <h1 style="font-size: 1.5rem;">Login Token</h1>
        <p class="mt-2">Copy this token and paste it into your terminal to complete login.</p>

        <div class="mt-3">
            <div class="token-label">Token</div>
            <div class="code-block token-value">{{ token }}</div>
        </div>

        <div class="mt-3">
            <div class="token-label">Device ID</div>
            <div class="code-block token-value">{{ device_id }}</div>
        </div>
    </div>
</div>
{% endblock %}
